<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tim Williams – Certification Portfolio</title>

<style>

/* ------------------------------
   BRAND COLOURS & TYPOGRAPHY
--------------------------------*/
:root {
  --navy: #0A1A2F;
  --charcoal: #1F1F1F;
  --electric: #0078FF;
  --soft-blue: #E8F2FF;
  --light-grey: #F5F7FA;
  --white: #FFFFFF;
  --muted-grey: #6A6A6A;

  --heading-font: 'Montserrat', sans-serif;
  --body-font: 'Inter', 'Segoe UI', sans-serif;
}

/* ------------------------------
   GLOBAL LAYOUT
--------------------------------*/
body {
  margin: 0;
  padding: 0;
  background: var(--white);
  font-family: var(--body-font);
  color: var(--charcoal);
  line-height: 1.6;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 80px;
}

/* ------------------------------
   HERO HEADER
--------------------------------*/
.hero-banner {
  background: var(--navy);
  padding: 48px 80px;
  color: var(--white);
  width: 100%;
  box-sizing: border-box;
}

.hero-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
  gap: 40px;
}

.hero-photo {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid white;
}

.hero-text {
  flex: 1;
}

.hero-text h1 {
  font-family: var(--heading-font);
  font-size: 48px;
  margin: 0 0 8px 0;
}

.hero-text p {
  font-size: 18px;
  margin: 4px 0;
  color: var(--electric);
}

/* ------------------------------
   SECTION HEADERS
--------------------------------*/
.section {
  margin-top: 48px;
}

.section h3 {
  font-family: var(--heading-font);
  font-size: 26px;
  font-weight: 600;
  margin: 0 0 12px 0;
}

.section .accent {
  width: 64px;
  height: 4px;
  background: var(--electric);
  border-radius: 2px;
  margin-bottom: 24px;
}
