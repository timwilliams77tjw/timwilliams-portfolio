<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tim Williams – Certification Portfolio</title>

<link rel="stylesheet" href="certifications.css?v=1">
<script src="certifications.js?v=1002" defer></script>
</head>

<body class="page-certifications">

<!-- HEADER INCLUDE -->
<div id="header"></div>

<!-- Load global.js BEFORE fetching the header -->
<script src="global.js"></script>

<script>
fetch("header-standard.html")
    .then(r => r.text())
    .then(h => {
        document.getElementById("header").innerHTML = h;
        initGlobal();
    });
</script>

<!-- FILTER BAR -->
<div class="sticky-bar">
    <button id="expandAllBtn" class="filter-btn special-btn">Expand All</button>
    <button id="collapseAllBtn" class="filter-btn special-btn">Collapse All</button>
    <button class="filter-btn" data-filter="Professional Certifications">Certifications</button>
    <button class="filter-btn" data-filter="Leadership & Management">Leadership</button>
    <button class="filter-btn" data-filter="Agile & Scrum">Agile</button>
    <button class="filter-btn" data-filter="AI & Copilot">AI</button>
    <button class="filter-btn" data-filter="Microsoft Skills & Cloud">Microsoft</button>
    <button class="filter-btn" data-filter="Security & Governance">Security</button>
    <button class="filter-btn" data-filter="Volunteering">Volunteering</button>
    <button class="filter-btn" data-filter="Memberships">Memberships</button>
    <button class="filter-btn" data-filter="Background Checks">Checks</button>
</div>

<!-- CERTIFICATIONS -->
<div id="certificationsContainer" class="container"></div>

<!-- FLOATING BUTTONS -->
<div id="fab" class="fab" aria-label="Back to top">⬆️</div>
<a id="bookingFab" class="fab fab-booking" href="calendar.html" aria-label="Make a booking">📅</a>

<!-- FOOTER INCLUDE -->
<div id="footer"></div>

<script>
fetch("footer.html")
    .then(r => r.text())
    .then(h => document.getElementById("footer").innerHTML = h);
</script>

<!-- JSON DATA -->
<script id="cert-data">
{ /* unchanged JSON */ }
</script>

</body>
</html>
