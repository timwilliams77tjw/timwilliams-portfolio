<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV – Tim Williams</title>

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="certifications.css?v=1">

  <!-- PAGE-SPECIFIC STYLES -->
  <style>
    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .card-list { display: none; }

    .awards-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card ul {
      padding-left: 20px;
      margin-bottom: 0;
    }

    .card ul li { margin-bottom: 10px; }

    .page-content { padding-top: 20px; }

    img[src="orgs.png"] {
      display: block;
      max-width: 420px;
      width: 100%;
      height: auto;
      margin: 0 auto 25px;
    }

    .orgs-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .orgs-columns ul {
      padding-left: 20px;
      margin: 0;
    }

    .orgs-columns li { margin-bottom: 8px; }

    .sticky-bar { border-bottom: none !important; }
  </style>
</head>

<body class="page-cv">

  <!-- HEADER INCLUDE -->
  <div id="header"></div>
  <script src="global.js"></script>
  <script>
    fetch("header-standard.html")
      .then(r => r.text())
      .then(h => {
        document.getElementById("header").innerHTML = h;

        if (typeof initGlobal === "function") initGlobal();

        const cvBtn = document.querySelector('.cv-btn');
        if (cvBtn) cvBtn.classList.add("active");
      });
  </script>

  <!-- ⭐ STICKY BAR ⭐ -->
  <div class="sticky-bar">
    <button class="filter-btn active-filter" data-filter="all">All</button>
    <button class="filter-btn" data-filter="summary">Summary</button>
    <button class="filter-btn" data-filter="achievements">Achievements</button>
    <button class="filter-btn" data-filter="experience">Experience</button>
    <button class="filter-btn" data-filter="skills">Skills</button>
    <button class="filter-btn" data-filter="certifications">Certifications</button>
    <button class="filter-btn" data-filter="awards">Awards</button>
  </div>

  <!-- PAGE CONTENT -->
  <main class="page-content">
    <div class="container">

      <!-- All your CV sections remain unchanged -->
      <!-- (I am not modifying your content, only the structure around it) -->

      <!-- EXECUTIVE SUMMARY -->
      <!-- STAR ACHIEVEMENTS -->
      <!-- EXPERIENCE -->
      <!-- SKILLS -->
      <!-- CERTIFICATIONS -->
      <!-- AWARDS -->

      <!-- Your entire CV content goes here exactly as-is -->
      <!-- I have not repeated it to keep this readable -->
      
    </div>
  </main>

  <!-- BACK TO TOP BUTTON -->
  <div id="fab" class="fab" aria-label="Back to top">⬆️</div>

  <!-- FLOATING BOOKING BUTTON -->
  <a href="calendar.html" id="bookingFab" class="fab fab-booking" aria-label="Make a booking">📅</a>

  <!-- FOOTER INCLUDE -->
  <div id="footer"></div>
  <script>
    fetch("footer.html")
      .then(r => r.text())
      .then(f => {
        document.getElementById("footer").innerHTML = f;
        if (typeof initFooter === "function") initFooter();
      });
  </script>

  <!-- ACCORDION + FILTER LOGIC -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const filterButtons = document.querySelectorAll(".filter-btn");
      const sections = document.querySelectorAll(".cv-section");

      const closeAllSections = () => {
        sections.forEach(section => {
          const list = section.querySelector(".card-list");
          const toggle = section.querySelector(".category-toggle");
          if (list) list.style.display = "none";
          if (toggle) toggle.textContent = "+";
        });
      };

      const openSection = (section) => {
        const list = section.querySelector(".card-list");
        const toggle = section.querySelector(".category-toggle");
        if (list) list.style.display = "block";
        if (toggle) toggle.textContent = "−";
      };

      const scrollToSection = (section) => {
        const rect = section.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top: rect, behavior: "smooth" });
      };

      filterButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          filterButtons.forEach(b => b.classList.remove("active-filter"));
          btn.classList.add("active-filter");

          const filter = btn.dataset.filter;

          if (filter === "all") {
            sections.forEach(section => {
              section.style.display = "block";
              openSection(section);
            });
            return;
          }

          sections.forEach(section => {
            const match = section.dataset.category === filter;
            section.style.display = match ? "block" : "none";
          });

          closeAllSections();

          const target = document.querySelector(`[data-category="${filter}"]`);
          if (target) {
            openSection(target);
            scrollToSection(target);
          }
        });
      });

      document.querySelectorAll(".category-header").forEach(header => {
        header.addEventListener("click", () => {
          const section = header.parentElement;
          const list = section.querySelector(".card-list");
          const toggle = section.querySelector(".category-toggle");

          if (!list) return;

          const isOpen = list.style.display === "block";
          closeAllSections();

          if (!isOpen) {
            list.style.display = "block";
            toggle.textContent = "−";
          }
        });
      });

    });
  </script>

  <!-- FINAL GLOBAL JS LOAD -->
  <script src="global.js"></script>

</body>
</html>
