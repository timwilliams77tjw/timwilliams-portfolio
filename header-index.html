<script>
(function() {

    const isMobile = () => window.innerWidth <= 700;
    let openMenu = null;

    // Close all menus
    function closeAllMenus() {
        document.querySelectorAll('.nav-item.open').forEach(item => {
            item.classList.remove('open');
        });
        openMenu = null;
    }

    // Toggle a specific menu
    function toggleMenu(item) {
        const isOpen = item.classList.contains('open');

        // Close everything first
        closeAllMenus();

        // Re-open only if it was previously closed
        if (!isOpen) {
            item.classList.add('open');
            openMenu = item;
        }
    }

    // Handle mobile tap behaviour
    document.querySelectorAll('.nav-item > a').forEach(link => {
        link.addEventListener('click', function(e) {

            if (!isMobile()) return; // desktop uses hover only

            e.preventDefault();
            const parent = this.parentElement;

            toggleMenu(parent);
        });
    });

    // Close menus when clicking outside
    document.addEventListener('click', function(e) {
        if (!isMobile()) return;

        const clickedInsideMenu = e.target.closest('.nav-item');
        if (!clickedInsideMenu) {
            closeAllMenus();
        }
    });

    // Close menus on scroll (mobile only)
    window.addEventListener('scroll', function() {
        if (isMobile()) closeAllMenus();
    });

    // Close menus on resize (switching between mobile/desktop)
    window.addEventListener('resize', function() {
        if (!isMobile()) closeAllMenus();
    });

})();
</script>
