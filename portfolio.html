<script>
fetch("header-standard.html")
    .then(r => r.text())
    .then(h => {
        document.getElementById("header").innerHTML = h;
        initGlobal();

        // ⭐ Force Portfolio button to be active on this page
        const portfolioBtn = document.querySelector('.brand-btn[onclick="openPortfolioMenu(event)"]');
        if (portfolioBtn) {
            portfolioBtn.classList.add("active");
        }
    });
</script>
