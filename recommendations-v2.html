<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Tim Williams  | IT Transformation Leader</title>


<style>

.header-layout {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 40px; 
  max-width: 1200px;
  margin: 0 auto;
}

.header-img {
  height: 120px;
  width: 120px;
  object-fit: cover;
}

.profile {
  border-radius: 8px;
}

.header-text {
  flex: 1;
  text-align: center;
}



.brand-btn {
  background: #0A1A2F;
  color: #FFFFFF;
  padding: 14px 28px;
  border-radius: 8px;
  font-family: 'Montserrat', sans-serif;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: 0.25s ease;
  border: 2px solid #0A1A2F;
}

.brand-btn:hover {
  background: #FFFFFF;
  color: #0A1A2F;
  border-color: #0078FF;
  cursor: pointer;
}

body {
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  background: #f5f7fa;
  color: #333;
  line-height: 1.6;
}

header {
  background: linear-gradient(120deg, #0a2540, #1f4e79);
  color: white;
  padding: 40px 20px;
}

header h1 {
  font-size: clamp(32px, 6vw, 48px);
  margin-bottom: 10px;
}

header p {
  font-size: clamp(16px, 3.5vw, 20px);
  opacity: 0.9;
  margin: 8px 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
  transition: transform 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.badge {
  display: inline-block;
  background: #e6edf5;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 20px;
  font-size: 13px;
}

footer {
  background: #0a2540;
  color: white;
  padding: 40px;
  margin-top: 60px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-qr img {
  width: 60px;   /* adjust size */
  height: auto;
  opacity: 0.9;
}


@media (max-width: 768px) {
  .header-layout {
    flex-direction: column;
    text-align: center;
    gap: 20px;
  }

  .header-img {
    width: 90px;
    height: 90px;
  }

  .header-text {
    text-align: center;
    padding: 0 10px;
  }

  .button-group {
    flex-direction: column;
    gap: 12px;
  }

  .brand-btn {
    width: 100%;
    max-width: 260px;
    margin: 0 auto;
  }


/* Remove darker bottom strip on recommendations header */
header {
  background: #0A1A2F !important; /* or your preferred solid brand blue */
  background-image: none !important;
}

/* Match the Certifications header exactly */
header {
  background: linear-gradient(120deg, #0a2540, #1f4e79) !important;
  background-image: linear-gradient(120deg, #0a2540, #1f4e79) !important;
}
/* FINAL header override for Recommendations */
header {
  background: linear-gradient(120deg, #0a2540, #1f4e79) !important;
  background-image: linear-gradient(120deg, #0a2540, #1f4e79) !important;
}
/* Final header override for Recommendations */
header {
  background: linear-gradient(120deg, #0a2540, #1f4e79) !important;
  background-image: linear-gradient(120deg, #0a2540, #1f4e79) !important;
}

  </style>

</head>

<body>

  <header>
  <div class="header-layout">
    <img src="profile.jpg" alt="Tim Williams Photo" class="header-img profile">
    <div class="header-text">
      <h1>Tim Williams</h1>
            <p>Senior IT Project/PMO Manager | Cyber Security | Cloud Transformation | Digital Workplace | Infrastructure</p>
      <p>25+ years delivering enterprise transformation across Public & Private Sectors</p>
  </div>
</header>




  <h2>Recommendations</h2>
  <div class="card">
    <div class="sk-ww-linkedin-recommendations" data-embed-id="25660597"></div>
    <script src="https://widgets.sociablekit.com/linkedin-recommendations/widget.js" defer></script>
  </div>

<footer>
  <div>© Tim Williams | IT Transformation Portfolio</div>

</footer>


</body>
</html>
