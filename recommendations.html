<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Williams – Recommendations</title>

    <link rel="stylesheet" href="certifications.css">
    <link rel="stylesheet" href="header-standard.css">

<style>

/* Enable page background to react to dark mode */
body.page-certifications{
  background: var(--bg);
  color: var(--text-main);
  transition: background 0.3s ease, color 0.3s ease;
}

/* Sticky bar styling */
.sticky-follow{
  background: var(--accent);
}

</style>

</head>

<body class="page-certifications">

<!-- HEADER INCLUDE -->
<div id="header-placeholder"></div>

<script>
fetch("/header-standard.html?v=30020")
  .then(r => r.text())
  .then(h => {
      document.getElementById("header-placeholder").innerHTML = h;

      const script = document.createElement("script");
      script.src = "/header-standard.js?v=30020";
      script.onload = () => initHeader();
      document.body.appendChild(script);
  });
</script>




<!-- PAGE TITLE -->
<h2 style="text-align:center; margin-top:40px;">Recommendations</h2>


<!-- RECOMMENDATIONS WIDGET -->
<div class="container">
  <div class="card">
    <div class="sk-ww-linkedin-recommendations" data-embed-id="25660597"></div>
    <script src="https://widgets.sociablekit.com/linkedin-recommendations/widget.js" defer></script>
  </div>
</div>


<!-- BACK TO TOP BUTTON -->
<div id="fab" class="fab" aria-label="Back to top">⬆️</div>


<!-- FLOATING BOOKING BUTTON -->
<a href="calendar.html" id="bookingFab" class="fab fab-booking" aria-label="Make a booking">📅</a>


<!-- FOOTER INCLUDE -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(r => r.text())
  .then(h => document.getElementById("footer").innerHTML = h);
</script>




</body>
</html>
